name: Feature Pipeline (Hourly)

on:
  schedule:
    - cron: "0 * * * *"   # Every hour at :00
  workflow_dispatch:        # Manual trigger for testing

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: ${{ github.workspace }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Confirm commit and src/data layout
        run: |
          echo "HEAD=$(git rev-parse HEAD)"
          git log -1 --oneline
          test -f src/data/openmeteo_client.py || (echo "ERROR: src/data/openmeteo_client.py missing on this commit" && exit 1)
          test -f run_pipeline.py || (echo "ERROR: run_pipeline.py missing" && exit 1)
          ls -la src/data/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Verify src package layout
        run: |
          test -f src/data/openmeteo_client.py
          python -c "from src.data.openmeteo_client import fetch_combined; print('import OK:', fetch_combined.__module__)"
          python -c "import pymongo; print('pymongo OK')"

      - name: Run feature pipeline
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          MONGODB_DB: ${{ secrets.MONGODB_DB || 'aqi_predictor' }}
        run: python run_pipeline.py feature
