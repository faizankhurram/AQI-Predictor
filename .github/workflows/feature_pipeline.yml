name: Feature Pipeline (Hourly)

on:
  schedule:
    - cron: "0 * * * *"   # Every hour at :00
  workflow_dispatch:        # Manual trigger for testing

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: ${{ github.workspace }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Verify src package layout
        run: |
          test -f src/data/openmeteo_client.py
          python -c "from src.data.openmeteo_client import fetch_combined; print('import OK:', fetch_combined.__module__)"

      - name: Run feature pipeline
        env:
          HOPSWORKS_HOST: eu-west.cloud.hopsworks.ai
          HOPSWORKS_API_KEY: ${{ secrets.HOPSWORKS_API_KEY }}
          HOPSWORKS_PROJECT: ${{ secrets.HOPSWORKS_PROJECT }}
        run: python run_feature_pipeline.py
