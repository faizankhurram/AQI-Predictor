name: Training Pipeline (Daily)

on:
  schedule:
    - cron: "0 2 * * *"    # Daily at 02:00 UTC (07:00 Karachi)
  workflow_dispatch:         # Manual trigger for testing

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    defaults:
      run:
        working-directory: ${{ github.workspace }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Verify src package layout
        run: |
          test -f src/data/openmeteo_client.py
          python -c "from src.models.sklearn_trainer import train_and_evaluate; print('import OK')"
          python -c "import pymongo; print('pymongo OK')"

      - name: Run training pipeline
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          MONGODB_DB: ${{ secrets.MONGODB_DB || 'aqi_predictor' }}
        run: python run_pipeline.py train
