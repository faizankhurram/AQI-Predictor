location:
  name: Karachi
  latitude: 24.8607
  longitude: 67.0011
  timezone: Asia/Karachi

mongodb:
  database: aqi_predictor
  feature_collection: aqi_hourly_v1
  model_collection: model_registry
  model_name: aqi_forecaster

data:
  backfill_days: 90
  forecast_horizons_h: [24, 48, 72]
  lag_hours: [1, 24]
  train_test_split_days: 14
  feature_correlation_threshold: 0.85

alerts:
  good_max: 50
  moderate_max: 100
  sensitive_max: 150
  unhealthy_max: 200
  # above 200 = Very Unhealthy / Hazardous
